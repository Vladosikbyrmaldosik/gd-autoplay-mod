name: Build Geode Mod
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          sdk: nightly
      - uses: actions/upload-artifact@v4
        with:
          name: AutoPlayer.geode
          path: ${{ steps.build.outputs.build-output }}
